name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: risohub
          POSTGRES_PASSWORD: risohub_test
          POSTGRES_DB: risohub_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      # Database
      DATABASE_URL: postgresql://risohub:risohub_test@localhost:5432/risohub_test
      NODE_ENV: test

      # Auth
      JWT_SECRET: e2e-test-jwt-secret-not-for-production
      JWT_REFRESH_SECRET: e2e-test-refresh-secret

      # AWS (mocked in test — S3 calls are skipped)
      AWS_REGION: eu-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_BUCKET: risohub-test-bucket

      # Playwright
      E2E_BASE_URL: http://localhost:5173
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_SURVEYOR_EMAIL: ${{ secrets.E2E_SURVEYOR_EMAIL }}
      E2E_SURVEYOR_PASSWORD: ${{ secrets.E2E_SURVEYOR_PASSWORD }}
      E2E_INSTALLER_EMAIL: ${{ secrets.E2E_INSTALLER_EMAIL }}
      E2E_INSTALLER_PASSWORD: ${{ secrets.E2E_INSTALLER_PASSWORD }}

      # Frontend
      VITE_API_URL: http://localhost:4000

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node setup ────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ── Install dependencies ──────────────────────────────────
      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      # ── Database setup ────────────────────────────────────────
      - name: Run database migrations
        working-directory: backend
        run: npm run migrate

      - name: Seed test data
        working-directory: backend
        run: npm run seed:test

      # ── Start servers ─────────────────────────────────────────
      - name: Start backend API
        working-directory: backend
        run: npm run start:test &
        # Waits up to 30s for the API to be ready

      - name: Wait for backend
        run: npx wait-on http://localhost:4000/api/health --timeout 30000

      - name: Start frontend dev server
        working-directory: frontend
        run: npm run dev &

      - name: Wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 30000

      # ── Run E2E tests ─────────────────────────────────────────
      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: true

      # ── Artifacts ─────────────────────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: frontend/e2e/report/
          retention-days: 14

      - name: Upload test screenshots (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots-${{ github.run_number }}
          path: frontend/e2e/test-results/
          retention-days: 7
